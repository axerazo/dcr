name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck and build
        run: npm run build
        env:
          # Build-time placeholders only — the app guards missing values at runtime.
          VITE_SUPABASE_URL: ""
          VITE_SUPABASE_ANON_KEY: ""

      - name: Test
        run: npm run test:run
